<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Coding 需求合約圖</title>
  <desc id="desc">把白話需求拆成資料、例外與查核三個層次，讓 AI 寫程式前先讓需求能被追問。</desc>
  <rect width="1400" height="760" fill="#fafaf8"/>
  <text x="700" y="72" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="700" fill="#172033">AI 寫程式前，需求先要能被人追問</text>

  <g font-family="Noto Sans TC, Microsoft JhengHei, sans-serif">
    <rect x="130" y="160" width="360" height="125" rx="18" fill="#ffffff" stroke="#cbd6e2" stroke-width="2"/>
    <text x="170" y="212" font-size="28" font-weight="700" fill="#1f4f7a">我要抓什麼？</text>
    <text x="170" y="252" font-size="22" fill="#4d5b6b">公司、期間、欄位、來源</text>

    <rect x="250" y="325" width="360" height="125" rx="18" fill="#ffffff" stroke="#cbd6e2" stroke-width="2"/>
    <text x="290" y="377" font-size="28" font-weight="700" fill="#7b5b1d">例外怎麼辦？</text>
    <text x="290" y="417" font-size="22" fill="#4d5b6b">缺值、單位、改名、空白月份</text>

    <rect x="370" y="490" width="360" height="125" rx="18" fill="#ffffff" stroke="#cbd6e2" stroke-width="2"/>
    <text x="410" y="542" font-size="28" font-weight="700" fill="#1f6b55">如何證明沒錯？</text>
    <text x="410" y="582" font-size="22" fill="#4d5b6b">人工核對、來源日期、修正紀錄</text>
  </g>

  <path d="M570 220 C790 250, 855 330, 900 445" fill="none" stroke="#a6b4c3" stroke-width="5" stroke-linecap="round"/>
  <path d="M884 432 l22 20 l-30 5" fill="none" stroke="#a6b4c3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="850" y="255" width="390" height="290" rx="24" fill="#172033"/>
  <text x="1045" y="318" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700" fill="#ffffff">十行白話需求</text>
  <text x="1045" y="374" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23" fill="#e6edf3">不是給 AI 的咒語</text>
  <text x="1045" y="425" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23" fill="#e6edf3">而是給自己與同學檢查的合約</text>
  <line x1="910" y1="465" x2="1180" y2="465" stroke="#5d7287" stroke-width="2"/>
  <text x="1045" y="512" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22" fill="#ffffff">需求不清，程式跑起來也只是錯得很快。</text>
</svg>
