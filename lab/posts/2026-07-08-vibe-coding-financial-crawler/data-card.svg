<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">會計資料卡</title>
  <desc id="desc">學生在圖表之外必須交出的資料卡，包含來源、單位、缺漏、人工核對與會計解讀。</desc>
  <rect width="1400" height="780" fill="#fbfaf7"/>
  <text x="700" y="78" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="700" fill="#172033">資料卡比折線圖更誠實</text>
  <text x="700" y="122" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22" fill="#637083">圖會讓人以為自己懂了；資料卡會逼人說出自己查過什麼。</text>

  <rect x="220" y="170" width="960" height="460" rx="24" fill="#ffffff" stroke="#cbd6e2" stroke-width="2"/>
  <rect x="220" y="170" width="960" height="78" rx="24" fill="#172033"/>
  <text x="270" y="220" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="28" font-weight="700" fill="#ffffff">作業附件：資料檢查卡</text>

  <g font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="24">
    <text x="285" y="310" font-weight="700" fill="#1f4f7a">來源</text>
    <text x="470" y="310" fill="#263447">MOPS 公開資訊觀測站，抓取日期 2026-07-08</text>
    <line x1="285" y1="335" x2="1115" y2="335" stroke="#e0e6ed" stroke-width="2"/>

    <text x="285" y="385" font-weight="700" fill="#1f4f7a">單位</text>
    <text x="470" y="385" fill="#263447">月營收：新臺幣千元；圖表已換算為百萬元</text>
    <line x1="285" y1="410" x2="1115" y2="410" stroke="#e0e6ed" stroke-width="2"/>

    <text x="285" y="460" font-weight="700" fill="#1f4f7a">例外</text>
    <text x="470" y="460" fill="#263447">公司更名、空白月份、合併與個別資料差異</text>
    <line x1="285" y1="485" x2="1115" y2="485" stroke="#e0e6ed" stroke-width="2"/>

    <text x="285" y="535" font-weight="700" fill="#1f4f7a">核對</text>
    <text x="470" y="535" fill="#263447">至少一筆回到原始網頁人工核對</text>
    <line x1="285" y1="560" x2="1115" y2="560" stroke="#e0e6ed" stroke-width="2"/>

    <text x="285" y="610" font-weight="700" fill="#1f4f7a">解讀</text>
    <text x="470" y="610" fill="#263447">趨勢只是線索，不能直接等於公司變好或變差</text>
  </g>

  <rect x="325" y="675" width="750" height="58" rx="18" fill="#eaf3ee"/>
  <text x="700" y="712" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22" font-weight="700" fill="#1f6b55">真正的交付物不是程式碼，而是一條可以被重跑、被追問的資料路徑。</text>
</svg>
