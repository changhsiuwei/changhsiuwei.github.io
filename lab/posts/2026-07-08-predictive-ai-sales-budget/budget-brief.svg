<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">預算備忘錄圖</title>
  <desc id="desc">模型輸出要被轉成資料、假設與決策三段備忘錄，最後由人負責簽名。</desc>
  <rect width="1400" height="760" fill="#f9faf8"/>
  <text x="700" y="74" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="700" fill="#142033">模型不是答案，是一份要被翻譯的備忘錄</text>

  <g font-family="Noto Sans TC, Microsoft JhengHei, sans-serif">
    <rect x="110" y="170" width="300" height="340" rx="18" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
    <text x="260" y="228" text-anchor="middle" font-size="28" font-weight="700" fill="#204c73">資料</text>
    <line x1="155" y1="255" x2="365" y2="255" stroke="#d7dee7" stroke-width="2"/>
    <text x="155" y="310" font-size="23" fill="#263447">哪些欄位可用？</text>
    <text x="155" y="365" font-size="23" fill="#263447">資料在哪一天取得？</text>
    <text x="155" y="420" font-size="23" fill="#263447">有沒有缺漏或例外？</text>

    <rect x="550" y="170" width="300" height="340" rx="18" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
    <text x="700" y="228" text-anchor="middle" font-size="28" font-weight="700" fill="#7a5c1f">假設</text>
    <line x1="595" y1="255" x2="805" y2="255" stroke="#d7dee7" stroke-width="2"/>
    <text x="595" y="310" font-size="23" fill="#263447">促銷是否照計畫？</text>
    <text x="595" y="365" font-size="23" fill="#263447">價格是否維持？</text>
    <text x="595" y="420" font-size="23" fill="#263447">需求波動由誰承擔？</text>

    <rect x="990" y="170" width="300" height="340" rx="18" fill="#ffffff" stroke="#cbd5df" stroke-width="2"/>
    <text x="1140" y="228" text-anchor="middle" font-size="28" font-weight="700" fill="#1f6b55">決策</text>
    <line x1="1035" y1="255" x2="1245" y2="255" stroke="#d7dee7" stroke-width="2"/>
    <text x="1035" y="310" font-size="23" fill="#263447">採購要不要提前？</text>
    <text x="1035" y="365" font-size="23" fill="#263447">庫存要保守或積極？</text>
    <text x="1035" y="420" font-size="23" fill="#263447">年底差異如何解釋？</text>
  </g>

  <path d="M430 340 C470 315, 510 315, 535 340" fill="none" stroke="#91a1b2" stroke-width="4" stroke-linecap="round"/>
  <path d="M870 340 C910 315, 950 315, 975 340" fill="none" stroke="#91a1b2" stroke-width="4" stroke-linecap="round"/>
  <path d="M522 330 l18 10 l-18 10" fill="none" stroke="#91a1b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M962 330 l18 10 l-18 10" fill="none" stroke="#91a1b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="260" y="590" width="880" height="82" rx="20" fill="#142033"/>
  <text x="700" y="642" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="26" font-weight="700" fill="#ffffff">會計人的工作不是替模型背書，而是說清楚自己為什麼接受或拒絕那個數字。</text>
</svg>
