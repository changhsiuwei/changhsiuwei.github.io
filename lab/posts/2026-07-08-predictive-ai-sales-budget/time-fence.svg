<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">預算時間封鎖圖</title>
  <desc id="desc">把預算日左側的可用資料與右側的事後資料分開，提醒學生模型不能偷看答案。</desc>
  <rect width="1400" height="780" fill="#fbfaf7"/>
  <text x="700" y="78" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="700" fill="#16213a">預算課第一件事：先把時間線封好</text>
  <text x="700" y="124" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22" fill="#5f6b7a">資料有沒有用，不是第一個問題；做預算那天能不能知道，才是第一個問題。</text>

  <line x1="700" y1="168" x2="700" y2="575" stroke="#9aa7b5" stroke-width="3" stroke-dasharray="10 12"/>
  <rect x="626" y="166" width="148" height="46" rx="23" fill="#16213a"/>
  <text x="700" y="197" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22" font-weight="700" fill="#ffffff">預算日</text>

  <rect x="110" y="190" width="500" height="350" rx="22" fill="#ffffff" stroke="#ccd6e0" stroke-width="2"/>
  <text x="360" y="242" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700" fill="#1f4f7a">當時知道的資料</text>
  <text x="360" y="285" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="18" fill="#607086">可以進模型，也可以進討論</text>
  <g font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25" fill="#263447">
    <text x="175" y="345">歷史銷售</text>
    <text x="175" y="397">既定價格</text>
    <text x="175" y="449">已排定促銷</text>
    <text x="175" y="501">節慶與通路資料</text>
  </g>
  <g fill="#1f8a70">
    <circle cx="145" cy="337" r="9"/><circle cx="145" cy="389" r="9"/><circle cx="145" cy="441" r="9"/><circle cx="145" cy="493" r="9"/>
  </g>

  <rect x="790" y="190" width="500" height="350" rx="22" fill="#fff7f4" stroke="#f0b8a8" stroke-width="2"/>
  <text x="1040" y="242" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700" fill="#a94d35">事後才知道的資料</text>
  <text x="1040" y="285" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="18" fill="#8a655b">拿來檢討可以，拿來預測不行</text>
  <g font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25" fill="#3f3030">
    <text x="855" y="345">實際銷售</text>
    <text x="855" y="397">退貨結果</text>
    <text x="855" y="449">競爭者臨時降價</text>
    <text x="855" y="501">月底庫存異常</text>
  </g>
  <g fill="#d35f45">
    <path d="M836 327 l18 18 m0 -18 l-18 18" stroke="#d35f45" stroke-width="5" stroke-linecap="round"/>
    <path d="M836 379 l18 18 m0 -18 l-18 18" stroke="#d35f45" stroke-width="5" stroke-linecap="round"/>
    <path d="M836 431 l18 18 m0 -18 l-18 18" stroke="#d35f45" stroke-width="5" stroke-linecap="round"/>
    <path d="M836 483 l18 18 m0 -18 l-18 18" stroke="#d35f45" stroke-width="5" stroke-linecap="round"/>
  </g>

  <rect x="220" y="610" width="960" height="86" rx="20" fill="#16213a"/>
  <text x="700" y="662" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="26" font-weight="700" fill="#ffffff">模型只能使用左側資料；右側資料進入訓練，就是偷看答案。</text>
</svg>
