<style>
/* Hide the main content initially */
#quarto-content:not(.unlocked) { display: none !important; }
#password-overlay { 
   position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
   background: #f8f9fa; z-index: 9999; display: flex; 
   flex-direction: column; justify-content: center; align-items: center; 
   font-family: sans-serif;
}
.pw-box { 
   background: white; border: 1px solid #ddd; padding: 40px; 
   border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; 
}
.pw-box input { margin-top: 20px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
.pw-box button { background: #2c3e50; color: white; border: none; border-radius: 5px; }
</style>

<div id="password-overlay">
  <div class="pw-box">
    <h2 style="margin-top:0;">🔒 指導學生專區</h2>
    <p style="color: #666;">本區僅限實驗室成員存取，請輸入通行密碼：</p>
    <input type="password" id="student-pw" placeholder="請輸入密碼..." style="padding: 10px; font-size: 16px; width: 100%;">
    <br>
    <button onclick="checkPassword()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; width: 100%;">驗證進入</button>
    <p id="pw-error" style="color: red; display: none; margin-top: 15px; font-weight: bold;">❌ 密碼錯誤，請重試！</p>
  </div>
</div>

<script>
async function checkPassword() {
  const pw = document.getElementById('student-pw').value.trim();
  const msgBuffer = new TextEncoder().encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  
  try {
    // 加上 ?t= 時間戳記，強迫瀏覽器每次都抓取最新密碼檔，避免被 Cache 記住舊密碼
    const response = await fetch('password_hash.txt?t=' + new Date().getTime());
    if (response.ok) {
      const expectedHash = await response.text();
      if (hashHex === expectedHash.trim()) {
        document.getElementById('password-overlay').style.display = 'none';
        document.getElementById('quarto-content').classList.add('unlocked');
        sessionStorage.setItem('student_auth', 'true');
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    } else {
      alert("無法讀取密碼設定檔！");
    }
  } catch (e) {
    console.error(e);
  }
}

// 監聽 Enter 鍵
document.getElementById('student-pw').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
      checkPassword();
    }
});

// 自動放行邏輯：如果是本地端預覽 (Shiny CMS) 或已登入
if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
   document.getElementById('password-overlay').style.display = 'none';
   document.getElementById('quarto-content').classList.add('unlocked');
} else if (sessionStorage.getItem('student_auth') === 'true') {
   document.getElementById('password-overlay').style.display = 'none';
   document.getElementById('quarto-content').classList.add('unlocked');
}
</script>
