<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">生成與驗證的成本不在同一邊</title>
  <desc id="desc">左側顯示 Agent 快速產生多個答案，右側顯示人類需要逐一查核與判斷，說明生成與驗證成本的不對稱。</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}
      .navy{fill:#152238}
      .muted{fill:#667485}
      .gold{fill:#b38b2e}
      .green{fill:#2d7a55}
      .line{stroke:#d9dde5;stroke-width:2;fill:none}
      .axis{stroke:#152238;stroke-width:2;fill:none}
      .card{fill:#fff;stroke:#d9dde5;stroke-width:2}
      .softBlue{fill:#eef3ff;stroke:#9ab6ff;stroke-width:2}
      .softGold{fill:#fff8e6;stroke:#d7aa43;stroke-width:2}
      .softRed{fill:#fff0ef;stroke:#e18880;stroke-width:2}
      .text{font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
      .h1{font-size:36px;font-weight:700;letter-spacing:0}
      .h2{font-size:24px;font-weight:700;letter-spacing:0}
      .body{font-size:20px;letter-spacing:0}
      .small{font-size:16px;letter-spacing:0}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#152238"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="text h1 navy" x="600" y="82" text-anchor="middle">生成很快，判斷很慢</text>
  <text class="text body muted" x="600" y="122" text-anchor="middle">Agent 的速度如果沒有驗證配套，只會把人工查核放大</text>

  <rect class="softBlue" x="78" y="180" width="455" height="388" rx="18"/>
  <text class="text h2 navy" x="305" y="232" text-anchor="middle">產生答案</text>
  <text class="text small muted" x="305" y="264" text-anchor="middle">速度快，成本低，候選很多</text>

  <g>
    <path class="axis" d="M194 466 C238 330, 306 454, 350 292 C384 390, 428 352, 462 436"/>
    <circle cx="194" cy="466" r="7" class="gold"/>
    <circle cx="238" cy="330" r="7" class="gold"/>
    <circle cx="306" cy="454" r="7" class="gold"/>
    <circle cx="350" cy="292" r="7" class="gold"/>
    <circle cx="428" cy="352" r="7" class="gold"/>
    <circle cx="462" cy="436" r="7" class="gold"/>
  </g>

  <rect class="card" x="152" y="500" width="310" height="44" rx="10"/>
  <text class="text body navy" x="307" y="529" text-anchor="middle">十個候選，看起來都能用</text>

  <path class="axis" d="M552 374 H648" marker-end="url(#arrow)"/>
  <text class="text small muted" x="600" y="350" text-anchor="middle">真正的成本轉到右邊</text>

  <rect class="softRed" x="667" y="180" width="455" height="388" rx="18"/>
  <text class="text h2 navy" x="895" y="232" text-anchor="middle">驗證答案</text>
  <text class="text small muted" x="895" y="264" text-anchor="middle">要查來源、跑測試、看上下文</text>

  <g class="text body navy">
    <rect class="card" x="740" y="304" width="310" height="46" rx="10"/>
    <text x="895" y="334" text-anchor="middle">欄位是否正確</text>
    <rect class="card" x="740" y="370" width="310" height="46" rx="10"/>
    <text x="895" y="400" text-anchor="middle">連結是否可用</text>
    <rect class="card" x="740" y="436" width="310" height="46" rx="10"/>
    <text x="895" y="466" text-anchor="middle">正式頁面是否更新</text>
  </g>

  <g>
    <circle cx="1036" cy="318" r="10" fill="#2d7a55"/>
    <path d="M1031 318 L1035 323 L1043 312" stroke="#fff" stroke-width="3" fill="none"/>
    <circle cx="1036" cy="384" r="10" fill="#2d7a55"/>
    <path d="M1031 384 L1035 389 L1043 378" stroke="#fff" stroke-width="3" fill="none"/>
    <circle cx="1036" cy="450" r="10" fill="#b9473a"/>
    <path d="M1030 444 L1042 456 M1042 444 L1030 456" stroke="#fff" stroke-width="3"/>
  </g>

  <line class="line" x1="78" y1="626" x2="1122" y2="626"/>
  <text class="text body navy" x="600" y="668" text-anchor="middle">任務能不能自動化，常常取決於它能不能被穩定檢查</text>
</svg>
