<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">硬檢查和編輯判斷分開</title>
  <desc id="desc">圖中把 Agent 輸出分給 deterministic assertion 和 LLM supervisor 兩層，再合併成 scorecard，讓人類只處理需要判斷的紅燈。</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}
      .navy{fill:#152238}
      .muted{fill:#647184}
      .gold{fill:#b38b2e}
      .green{fill:#2d7a55}
      .red{fill:#b9473a}
      .line{stroke:#d9dde5;stroke-width:2;fill:none}
      .arrow{stroke:#152238;stroke-width:2.4;fill:none}
      .card{fill:#fff;stroke:#d9dde5;stroke-width:2}
      .hard{fill:#eef3ff;stroke:#9ab6ff;stroke-width:2}
      .soft{fill:#fff8e6;stroke:#d7aa43;stroke-width:2}
      .score{fill:#edf7f2;stroke:#2d7a55;stroke-width:2}
      .text{font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
      .h1{font-size:36px;font-weight:700;letter-spacing:0}
      .h2{font-size:24px;font-weight:700;letter-spacing:0}
      .body{font-size:20px;letter-spacing:0}
      .small{font-size:16px;letter-spacing:0}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#152238"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="text h1 navy" x="600" y="82" text-anchor="middle">不要讓 LLM 當唯一法官</text>
  <text class="text body muted" x="600" y="122" text-anchor="middle">硬檢查先擋錯，語意判斷再看品質</text>

  <rect class="card" x="80" y="290" width="210" height="116" rx="18"/>
  <text class="text h2 navy" x="185" y="338" text-anchor="middle">Agent 輸出</text>
  <text class="text small muted" x="185" y="372" text-anchor="middle">文章、程式、部署</text>

  <path class="arrow" d="M300 324 H385" marker-end="url(#arrow)"/>
  <path class="arrow" d="M300 374 H385" marker-end="url(#arrow)"/>

  <rect class="hard" x="405" y="214" width="330" height="160" rx="18"/>
  <text class="text h2 navy" x="570" y="262" text-anchor="middle">硬檢查</text>
  <text class="text small muted" x="570" y="296" text-anchor="middle">檔案、路徑、render、連結</text>
  <g class="text small navy">
    <text x="452" y="336">通過或失敗，不寫評論</text>
  </g>

  <rect class="soft" x="405" y="414" width="330" height="160" rx="18"/>
  <text class="text h2 navy" x="570" y="462" text-anchor="middle">LLM supervisor</text>
  <text class="text small muted" x="570" y="496" text-anchor="middle">語氣、段落、圖文位置</text>
  <g class="text small navy">
    <text x="452" y="536">看品質，不替代規則</text>
  </g>

  <path class="arrow" d="M744 294 H820" marker-end="url(#arrow)"/>
  <path class="arrow" d="M744 494 H820" marker-end="url(#arrow)"/>

  <rect class="score" x="842" y="290" width="270" height="190" rx="18"/>
  <text class="text h2 navy" x="977" y="340" text-anchor="middle">Scorecard</text>
  <g class="text body navy">
    <text x="900" y="384">狀態</text>
    <circle cx="1040" cy="378" r="11" class="green"/>
    <text x="900" y="426">品質</text>
    <circle cx="1040" cy="420" r="11" class="gold"/>
    <text x="900" y="468">需人看</text>
    <circle cx="1040" cy="462" r="11" class="red"/>
  </g>

  <path class="arrow" d="M977 492 V572" marker-end="url(#arrow)"/>
  <text class="text body navy" x="977" y="622" text-anchor="middle">人類只處理亮紅燈的地方</text>
  <line class="line" x1="80" y1="660" x2="1120" y2="660"/>
</svg>
