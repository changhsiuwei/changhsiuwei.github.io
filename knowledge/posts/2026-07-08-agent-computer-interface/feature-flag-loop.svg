<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Feature flag 把新能力放進可回退的迴圈</title>
  <desc id="desc">新 Agent 能力先在 flag 後測試，通過回歸與主管判斷才進正式流程，失敗時回退並留下紀錄。</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}
      .navy{fill:#152238}
      .muted{fill:#647184}
      .green{fill:#2d7a55}
      .red{fill:#b9473a}
      .line{stroke:#d9dde5;stroke-width:2;fill:none}
      .arrow{stroke:#152238;stroke-width:2.4;fill:none}
      .card{fill:#fff;stroke:#d9dde5;stroke-width:2}
      .flag{fill:#fff8e6;stroke:#d7aa43;stroke-width:2}
      .test{fill:#eef3ff;stroke:#9ab6ff;stroke-width:2}
      .ok{fill:#edf7f2;stroke:#2d7a55;stroke-width:2}
      .bad{fill:#fff0ef;stroke:#e18880;stroke-width:2}
      .text{font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
      .h1{font-size:36px;font-weight:700;letter-spacing:0}
      .h2{font-size:24px;font-weight:700;letter-spacing:0}
      .body{font-size:20px;letter-spacing:0}
      .small{font-size:16px;letter-spacing:0}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#152238"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="text h1 navy" x="600" y="82" text-anchor="middle">新能力先進小圈，不直接碰正式流程</text>
  <text class="text body muted" x="600" y="122" text-anchor="middle">Feature flag 讓實驗、比較、回退都有位置</text>

  <rect class="flag" x="112" y="288" width="200" height="112" rx="18"/>
  <text class="text h2 navy" x="212" y="334" text-anchor="middle">Flag 開關</text>
  <text class="text small muted" x="212" y="368" text-anchor="middle">限定文章與任務</text>

  <rect class="test" x="392" y="210" width="220" height="112" rx="18"/>
  <text class="text h2 navy" x="502" y="256" text-anchor="middle">回歸測試</text>
  <text class="text small muted" x="502" y="290" text-anchor="middle">舊錯不准回來</text>

  <rect class="test" x="392" y="430" width="220" height="112" rx="18"/>
  <text class="text h2 navy" x="502" y="476" text-anchor="middle">品質檢查</text>
  <text class="text small muted" x="502" y="510" text-anchor="middle">文字、圖、分類</text>

  <rect class="ok" x="700" y="288" width="214" height="112" rx="18"/>
  <text class="text h2 navy" x="807" y="334" text-anchor="middle">正式流程</text>
  <text class="text small muted" x="807" y="368" text-anchor="middle">通過才放大</text>

  <rect class="bad" x="972" y="288" width="150" height="112" rx="18"/>
  <text class="text h2 navy" x="1047" y="334" text-anchor="middle">回退</text>
  <text class="text small muted" x="1047" y="368" text-anchor="middle">留下原因</text>

  <path class="arrow" d="M312 344 C350 292, 354 266, 374 266" marker-end="url(#arrow)"/>
  <path class="arrow" d="M312 344 C350 396, 354 486, 374 486" marker-end="url(#arrow)"/>
  <path class="arrow" d="M612 266 C660 266, 670 320, 682 344" marker-end="url(#arrow)"/>
  <path class="arrow" d="M612 486 C660 486, 670 368, 682 344" marker-end="url(#arrow)"/>
  <path class="arrow" d="M914 344 H954" marker-end="url(#arrow)"/>
  <path class="arrow" d="M1047 408 C1000 610, 248 610, 212 418" marker-end="url(#arrow)"/>

  <g>
    <circle cx="646" cy="342" r="18" class="green"/>
    <path d="M637 342 L644 349 L657 334" stroke="#fff" stroke-width="4" fill="none"/>
    <circle cx="946" cy="344" r="18" class="red"/>
    <path d="M937 335 L955 353 M955 335 L937 353" stroke="#fff" stroke-width="4"/>
  </g>

  <line class="line" x1="112" y1="648" x2="1122" y2="648"/>
  <text class="text body navy" x="600" y="688" text-anchor="middle">Agent 新能力要能試、能比、能退，才不會把實驗變成事故</text>
</svg>
